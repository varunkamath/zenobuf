# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # General formatting and cleanup
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(.*\.md|.*\.node)$
      - id: end-of-file-fixer
        exclude: ^(.*\.node|target/|dist/|Dockerfile)$
      - id: check-yaml
        exclude: ^(.github/workflows/)
      - id: check-added-large-files
        args: ["--maxkb=1000"]
        exclude: ^(.*\.node|.*\.onnx|.*\.bin|.*\.safetensors)$
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Rust formatting and linting
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt
        language: system
        types: [rust]
        args: ["--all", "--"]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check
        language: system
        types: [rust]
        pass_filenames: false
        args: ["--all-targets", "--all-features"]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy
        language: system
        types: [rust]
        pass_filenames: false
        args: ["--all-targets", "--all-features", "--", "-D", "warnings"]

  # Markdown formatting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: ["--fix"]
        exclude: ^(CLAUDE\.md|MCP_IMPLEMENTATION_RESEARCH\.md|CHANGELOG\.md)$

  # YAML formatting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ["-d", "{extends: relaxed, rules: {line-length: {max: 120}}}"]

  # Security checks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(.*\.lock|.*\.node|pnpm-lock\.yaml)$

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        files: Dockerfile.*
        args: ["--ignore", "DL3008"]

  - repo: https://github.com/reteps/dockerfmt
    rev: v0.3.9
    hooks:
      - id: dockerfmt
        args:
          - --indent=4
          - --write

  # Shell script linting
  # - repo: https://github.com/shellcheck-py/shellcheck-py
  #   rev: v0.11.0.1
  #   hooks:
  #     - id: shellcheck

# Configuration for specific tools
exclude: |
  (?x)^(
    target/|
    dist/|
    node_modules/|
    .*\.node|
    .*\.lock|
    pnpm-lock\.yaml|
    Cargo\.lock|
    qdrant_storage/|
    \.rune_cache/|
    \.cache/|
    models/
  )$

default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: "3.0.0"
